name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      - name: Build
        run: gradle jar
      - uses: actions/upload-artifact@v4
        with:
          name: world-supervisor-forge
          path: build/libs/*.jar
